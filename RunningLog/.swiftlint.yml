# SwiftLint Configuration for PostRunDrip

# Paths to include
included:
  - RunningLog

# Paths to exclude
excluded:
  - Pods
  - .build
  - DerivedData
  - "*.generated.swift"

# Rules to disable (too strict for most projects)
disabled_rules:
  - trailing_comma
  - todo
  - opening_brace
  - identifier_name  # Allow short names like 'a', 'r', 'g', 'b'

# Rules to opt-in to
opt_in_rules:
  - empty_count
  - empty_string
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_object_literal
  - fallthrough
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Rule configurations
line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 3
  function_level: 5

large_tuple:
  warning: 4
  error: 5

# Force cast/try are sometimes necessary in SwiftUI
force_cast:
  severity: warning

force_try:
  severity: warning

# Custom rules
custom_rules:
  no_print_statements:
    name: "No Print Statements"
    regex: "\\bprint\\s*\\("
    message: "Consider using a logging framework instead of print()"
    severity: warning
