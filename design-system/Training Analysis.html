<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Post Run Drip — Training Analysis</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
/>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          coral: "#D4592A",
          "coral-light": "#E8764A",
          "coral-dark": "#B84420",
          "bg-base": "#F5F3F0",
          "bg-card": "#FFFFFF",
          "bg-elevated": "#FAFAF8",
          "bg-calendar": "#E8E4DF",
          "text-primary": "#1A1815",
          "text-secondary": "#6B6560",
          "text-tertiary": "#9B9590",
          divider: "#E8E4E0",
          "divider-soft": "#EFECE8",
          "mood-energized": "#2D8A4E",
          "mood-positive": "#4A9E6B",
          "mood-neutral": "#9B9590",
          "mood-tired": "#C4873A",
          "mood-struggling": "#C45A3A",
          "mood-injured": "#B83A4A",
          sage: "#6B8068",
          plum: "#6B4A8A",
        },
        fontFamily: {
          display: ['"Crimson Pro"', '"PT Serif"', "Georgia", "serif"],
          body: ['"PT Serif"', "Georgia", "serif"],
          mono: ["ui-monospace", '"SF Mono"', '"Menlo"', '"Monaco"', "monospace"],
        },
      },
    },
  };
</script>

<style>
  body {
    background: #f5f3f0;
    color: #1a1815;
    font-family: "PT Serif", Georgia, serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .font-display {
    font-family: "Crimson Pro", "PT Serif", Georgia, serif;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.05;
  }
  .font-body { font-family: "PT Serif", Georgia, serif; }
  .font-mono {
    font-family: ui-monospace, "SF Mono", Menlo, Monaco, monospace;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  ::selection { background: rgba(212, 89, 42, 0.2); }

  /* Coach pull rule */
  .coach-note {
    font-family: "Crimson Pro", "PT Serif", Georgia, serif;
    font-style: italic;
    letter-spacing: -0.005em;
    color: #3a3530;
    border-left: 2px solid rgba(212, 89, 42, 0.55);
    padding-left: 0.95rem;
  }

  /* Editorial drop cap on the block-read */
  .drop-cap::first-letter {
    font-family: "Crimson Pro", Georgia, serif;
    font-weight: 700;
    font-style: italic;
    font-size: 3.4em;
    line-height: 0.9;
    float: left;
    margin: 0.06em 0.1em 0 -0.03em;
    color: #D4592A;
  }

  /* line · dot · line section break */
  .editorial-rule {
    display: flex; align-items: center; gap: 12px;
  }
  .editorial-rule::before,
  .editorial-rule::after {
    content: ""; flex: 1; height: 1px; background: #E8E4E0;
  }
  .editorial-rule__dot {
    width: 3px; height: 3px; border-radius: 999px; background: #C4C0BB;
  }

  /* Fig caption hover lift */
  .fig-card { transition: box-shadow 200ms ease; }
  .fig-card:hover { box-shadow: 0 8px 32px -16px rgba(26,24,21,0.10); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="training-analysis.jsx"></script>
</body>
</html>
