<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
.tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.10em; color: var(--ink-2); text-transform: uppercase; margin-bottom: 20px; }
.scale { display: grid; grid-template-columns: 30px 60px 1fr; gap: 14px; align-items: center; padding: 5px 0; }
.tok { font-family: var(--font-mono); font-size: 11px; color: var(--ink); font-weight: 600; }
.val { font-family: var(--font-mono); font-size: 10px; color: var(--ink-2); }
.bar { background: var(--coral); height: 12px; border-radius: 2px; }
</style></head>
<body><div class="card">
  <div class="tag">Spacing · 8pt grid</div>
  <div class="scale"><div class="tok">--1</div><div class="val">4px</div><div class="bar" style="width:4px"></div></div>
  <div class="scale"><div class="tok">--2</div><div class="val">8px</div><div class="bar" style="width:8px"></div></div>
  <div class="scale"><div class="tok">--3</div><div class="val">12px</div><div class="bar" style="width:12px"></div></div>
  <div class="scale"><div class="tok">--4</div><div class="val">16px</div><div class="bar" style="width:16px"></div></div>
  <div class="scale"><div class="tok">--5</div><div class="val">20px</div><div class="bar" style="width:20px"></div></div>
  <div class="scale"><div class="tok">--6</div><div class="val">24px</div><div class="bar" style="width:24px"></div></div>
  <div class="scale"><div class="tok">--7</div><div class="val">32px</div><div class="bar" style="width:32px"></div></div>
  <div class="scale"><div class="tok">--8</div><div class="val">40px</div><div class="bar" style="width:40px"></div></div>
  <div class="scale"><div class="tok">--9</div><div class="val">56px</div><div class="bar" style="width:56px"></div></div>
</div></body></html>
