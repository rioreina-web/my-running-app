<!doctype html>
<html><head><meta charset="utf-8"><title>Editorial rule</title>
<link rel="stylesheet" href="_card.css">
<style>
.tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.10em; color: var(--ink-2); text-transform: uppercase; margin-bottom: 20px; }
.rule { display:flex; align-items:center; gap:8px; }
.rule::before, .rule::after { content:""; flex:1; height:1px; background: var(--rule); }
.rule .d { width:3px; height:3px; border-radius:999px; background: var(--rule); }
.eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; color: var(--ink-2); text-transform: uppercase; }
.example { padding: 14px 0; }
.h { font-family: var(--font-display); font-weight: 700; font-size: 24px; color: var(--ink); }
.sub { font-family: var(--font-body); font-size: 13px; color: var(--ink-2); font-style: italic; margin-top: 4px; }
.hairline { height: 1px; background: var(--rule); }
.note { font-family: var(--font-body); font-style: italic; font-size: 12px; color: var(--ink-3); margin-top: 16px; }
</style></head>
<body><div class="card">
  <div class="tag">Dividers · editorial rule vs. hairline</div>
  <div class="example">
    <div class="eyebrow">EDITORIAL RULE — section breaks</div>
    <div class="rule" style="margin-top:10px"><span class="d"></span></div>
  </div>
  <div class="example">
    <div class="h">May 5th.</div>
    <div class="sub">— eleven weeks to the marathon. —</div>
    <div class="rule" style="margin: 14px 0"><span class="d"></span></div>
    <div class="eyebrow">TODAY</div>
    <div class="h" style="font-size:20px;margin-top:6px">How are you feeling?</div>
  </div>
  <div class="example" style="border-top:1px solid var(--rule);padding-top:18px">
    <div class="eyebrow">HAIRLINE — between rows</div>
    <div class="hairline" style="margin-top:12px"></div>
  </div>
  <p class="note">The rule is a typesetting mark, not a divider. Use it sparingly — at section boundaries, not between every row.</p>
</div></body></html>
