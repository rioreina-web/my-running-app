<!doctype html>
<html><head><meta charset="utf-8"><title>Surfaces</title>
<link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
.swatch__chip { height: 88px; }
.tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.10em; color: var(--ink-2); text-transform: uppercase; margin-bottom: 12px; }
</style></head>
<body><div class="card">
  <div class="tag">Surfaces · warm paper</div>
  <div class="grid">
    <div class="swatch"><div class="swatch__chip" style="background:#F5F3F0;border:1px solid #e8e4e0"></div><div class="swatch__name">Paper</div><div class="swatch__hex">#F5F3F0</div></div>
    <div class="swatch"><div class="swatch__chip" style="background:#FAFAF8;border:1px solid #e8e4e0"></div><div class="swatch__name">Elevated</div><div class="swatch__hex">#FAFAF8</div></div>
    <div class="swatch"><div class="swatch__chip" style="background:#FFFFFF;border:1px solid #e8e4e0"></div><div class="swatch__name">Card</div><div class="swatch__hex">#FFFFFF</div></div>
    <div class="swatch"><div class="swatch__chip" style="background:#E8E4DF"></div><div class="swatch__name">Paper deep</div><div class="swatch__hex">#E8E4DF</div></div>
    <div class="swatch"><div class="swatch__chip" style="background:#E8E4E0"></div><div class="swatch__name">Rule</div><div class="swatch__hex">#E8E4E0</div></div>
  </div>
</div></body></html>
