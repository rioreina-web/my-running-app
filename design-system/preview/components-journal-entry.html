<!doctype html>
<html><head><meta charset="utf-8"><title>Journal blockquote</title>
<link rel="stylesheet" href="_card.css">
<style>
.eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; color: var(--ink-2); text-transform: uppercase; }
.meta-row { display:flex; gap: 14px; align-items: baseline; margin-bottom: 8px; }
.h { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--ink); line-height: 1.1; margin: 4px 0 8px 0; }
.meta-line { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--ink-2); text-transform: uppercase; }
.meta-line .mood { color: #4A9E6B; }
.quote {
  font-family: var(--font-body); font-style: italic; font-size: 15px;
  color: var(--ink); line-height: 1.5;
  padding-left: 12px;
  border-left: 2px solid rgba(212,89,42,0.5);
  margin-top: 16px;
  max-width: 540px;
}
.coach-eyebrow {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em;
  color: var(--coral); text-transform: uppercase; margin-bottom: 6px;
}
</style></head>
<body><div class="card">
  <div class="meta-row">
    <span class="eyebrow">SUNDAY&nbsp;&nbsp;·&nbsp;&nbsp;APR 26</span>
  </div>
  <h2 class="h">Tempo, 6.5 mi.</h2>
  <div class="meta-line">7:25 / mi&nbsp;&nbsp;·&nbsp;&nbsp;48 min&nbsp;&nbsp;·&nbsp;&nbsp;<span class="mood">POSITIVE</span></div>
  <p class="quote">"Felt good through the warm-up — legs were heavy first mile but loosened up. Tempo blocks smoother than two weeks ago."</p>
</div></body></html>
